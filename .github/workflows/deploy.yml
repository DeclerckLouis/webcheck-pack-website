name: Deploy to Cloudflare Pages

# Cloudflare Pages deploys, both production and per-PR previews:
#   - push to main          -> PRODUCTION deploy (scan.packetflow.be)
#   - pull_request (ready)  -> PREVIEW deploy (unique *.pages.dev URL, with the
#                              /api Functions running, so a real scan works)
#   - workflow_dispatch     -> manual run
#
# Preview deploys are isolated from production (separate URL); merging to main is
# what promotes a change to production. Unlike a static host, these previews run
# the Cloudflare Pages Functions, so reviewers can test an actual domain scan.
#
# SETUP: the deploy step below creates the Pages project idempotently and applies
# the KV bindings from wrangler.toml (the CACHE/RATE namespaces already exist in
# the account). Remaining owner steps:
#   - Add repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID. [done]
#   - Add the custom domain scan.packetflow.be under the Pages project once it
#     exists (Pages -> packetflow-scan -> Custom domains).
#   - (Optional) Turnstile: set PUBLIC_TURNSTILE_SITEKEY + TURNSTILE_SECRET.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

# One deploy at a time per branch; don't cancel an in-progress run.
concurrency:
  group: cf-pages-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy
    # Skip draft PRs — only preview once a PR is ready for review. (push /
    # workflow_dispatch have no pull_request payload, so `.draft` is empty.)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    # Exposed at job level so the deploy step's `if:` can test for it (secrets
    # can't be referenced directly in an `if` expression).
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Canonical + sitemap always point at production (previews are
          # throwaway and shouldn't be indexed). Cloudflare Pages serves at the
          # root, so the base path is always "/".
          SITE_URL: https://scan.packetflow.be
          BASE_PATH: /
          # PUBLIC_ vars are inlined into the client bundle at build time, so the
          # Turnstile sitekey must be present HERE (a Cloudflare runtime var can't
          # reach the prerendered page). Empty = widget stays off. Pair it with
          # TURNSTILE_SECRET set as an encrypted var in the Cloudflare Pages
          # project (NOT a GitHub secret — that never reaches the Worker).
          PUBLIC_TURNSTILE_SITEKEY: ${{ secrets.PUBLIC_TURNSTILE_SITEKEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # Skips (CI stays green) until the owner adds the Cloudflare secrets
        # — see README §Deploy. Once CLOUDFLARE_API_TOKEN exists, deploys run.
        #
        # Deploys with the wrangler pinned in devDependencies (see package.json)
        # rather than cloudflare/wrangler-action, which pulled an old, vulnerable
        # wrangler 3.x at deploy time. wrangler reads the credentials from the
        # CLOUDFLARE_* env vars. --commit-dirty=true silences the warning about
        # the generated dist/ in the working tree.
        if: ${{ env.CF_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Ensure the project exists, then deploy. We only call `project create`
        # when it's actually missing — calling it unconditionally logs a scary
        # (but harmless) "already exists" error on every run after the first.
        # --branch drives prod vs preview: on push to main, github.ref_name is
        # `main` (the production branch) -> production; on a PR, github.head_ref
        # is the feature branch -> preview deployment.
        run: |
          npx wrangler pages project list | grep -q "packetflow-scan" \
            || npx wrangler pages project create packetflow-scan --production-branch=main
          npx wrangler pages deploy dist --project-name=packetflow-scan --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true
