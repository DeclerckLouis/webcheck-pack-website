name: Deploy to GitHub Pages

# Staging environment. Publishes a pull request to GitHub Pages once it's
# marked ready for review, so changes can be reviewed on a real URL before
# they go live on Cloudflare (production, from `main` — see deploy.yml).
# Merging the PR to main is what promotes it to production.
#
# NOTE: GitHub Pages has a single site per repo, so this is one shared staging
# URL. If two PRs are ready at the same time, the most recent build wins. Draft
# PRs are skipped (see the `if` on the build job).
#
# GitHub Pages serves under the project sub-path, so the build uses the base
# path resolved by configure-pages — unlike the Cloudflare build, which always
# serves at the domain root.
#
# ONE-TIME SETUP (required, owner only — CI cannot do this):
#   1. Repo → Settings → Pages → "Build and deployment" → Source: "GitHub Actions".
#   2. Repo → Settings → Environments → github-pages → "Deployment branches and
#      tags": allow the PR branches to deploy (e.g. "No restriction"), otherwise
#      a deploy from a non-default branch is rejected.
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-progress run. Separate group
# from the Cloudflare workflow so the two deploys run independently.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip draft PRs — only publish once a PR is ready for review. (A manual
    # dispatch has no pull_request payload, so `.draft` is empty and it runs.)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Resolve Pages base path
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Serve under the project sub-path (e.g. /webcheck-pack-website/) and point
          # canonical/sitemap URLs at the Pages origin.
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
